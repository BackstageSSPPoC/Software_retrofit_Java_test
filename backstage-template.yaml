apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: retrofit-jenkins-argocd-Generic
  title: Integrating CI/CD Into Existing Generic-Repo
  description: Inject CI/CD directly into Desired Repo/Branch (Node.js / Java Maven / Java Gradle / Python)

spec:
  owner: development
  type: service

  parameters:
    - title: Select Repo & Language
      required:
        - repo
        - language
      properties:

        repo:
          title: Select Repository
          type: string

        language:
          title: Project Language / Build Tool
          type: string
          enum:
            - nodejs
            - java-maven
            - java-gradle
            - python
          enumNames:
            - "Node.js (npm)    → port 3000"
            - "Java (Maven)     → port 8080"
            - "Java (Gradle)    → port 8080"
            - "Python (pip)     → port 5000"

        environment:
          title: Environment
          type: string
          enum:
            - dev
            - prod

        # Hidden field — user ko nahi dikhega, auto set hoga
        app_port:
          title: App Port
          type: string
          ui:widget: hidden
          default: "8080"

      # Language select hote hi app_port auto set ho jayega
      dependencies:
        language:
          oneOf:
            - properties:
                language:
                  enum:
                    - nodejs
                app_port:
                  type: string
                  default: "3000"
                  ui:widget: hidden
              required:
                - app_port

            - properties:
                language:
                  enum:
                    - java-maven
                app_port:
                  type: string
                  default: "8080"
                  ui:widget: hidden
              required:
                - app_port

            - properties:
                language:
                  enum:
                    - java-gradle
                app_port:
                  type: string
                  default: "8080"
                  ui:widget: hidden
              required:
                - app_port

            - properties:
                language:
                  enum:
                    - python
                app_port:
                  type: string
                  default: "5000"
                  ui:widget: hidden
              required:
                - app_port

  steps:

    # ─── Common files: manifests, catalog-info, sonar ────────────────────────────
    - id: fetch-common
      name: Fetch Common Template Files
      action: fetch:template
      input:
        url: ./template/skeleton
        values:
          app_name: ${{ parameters.repo }}
          app_env: ${{ parameters.environment }}
          language: ${{ parameters.language }}
          app_port: ${{ parameters.app_port }}   # ← auto port inject

    # ─── Node.js Pipeline ────────────────────────────────────────────────────────
    - id: fetch-nodejs-pipeline
      name: Fetch Node.js Jenkinsfile
      if: ${{ parameters.language === "nodejs" }}
      action: fetch:template
      input:
        url: ./template/nodejs
        targetPath: ./
        values:
          app_name: ${{ parameters.repo }}
          app_env: ${{ parameters.environment }}
          app_port: ${{ parameters.app_port }}

    # ─── Java Maven Pipeline ─────────────────────────────────────────────────────
    - id: fetch-java-maven-pipeline
      name: Fetch Java Maven Jenkinsfile
      if: ${{ parameters.language === "java-maven" }}
      action: fetch:template
      input:
        url: ./template/java-maven
        targetPath: ./
        values:
          app_name: ${{ parameters.repo }}
          app_env: ${{ parameters.environment }}
          app_port: ${{ parameters.app_port }}

    # ─── Java Gradle Pipeline ────────────────────────────────────────────────────
    - id: fetch-java-gradle-pipeline
      name: Fetch Java Gradle Jenkinsfile
      if: ${{ parameters.language === "java-gradle" }}
      action: fetch:template
      input:
        url: ./template/java-gradle
        targetPath: ./
        values:
          app_name: ${{ parameters.repo }}
          app_env: ${{ parameters.environment }}
          app_port: ${{ parameters.app_port }}

    # ─── Python Pipeline ─────────────────────────────────────────────────────────
    - id: fetch-python-pipeline
      name: Fetch Python Jenkinsfile
      if: ${{ parameters.language === "python" }}
      action: fetch:template
      input:
        url: ./template/python
        targetPath: ./
        values:
          app_name: ${{ parameters.repo }}
          app_env: ${{ parameters.environment }}
          app_port: ${{ parameters.app_port }}

    # ─── Inject into target repo ─────────────────────────────────────────────────
    - id: push-to-repo
      name: Inject CI/CD Directly
      action: github:push
      input:
        repoUrl: github.com?owner=BackstageSSPPoC&repo=${{ parameters.repo }}
        branch: main
        commitMessage: "chore: inject ${{ parameters.language }} CI/CD template (port: ${{ parameters.app_port }})"
        sourcePath: ./

  output:
    links:
      - title: View Repository
        url: https://github.com/BackstageSSPPoC/${{ parameters.repo | trim }}/tree/main
